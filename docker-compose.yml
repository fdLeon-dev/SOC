version: "3.9"

services:
  backend:
    build: ./backend
    container_name: defenseos-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./defenseos.db
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173
    volumes:
      - ./backend:/app            # hot-reload in dev
      - defenseos-db:/app/data
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: defenseos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  defenseos-db:
