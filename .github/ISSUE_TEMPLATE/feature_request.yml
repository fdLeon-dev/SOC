name: Feature request
description: Propose an improvement for DefenseOS
title: "feat: <short description>"
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are we trying to solve?
      placeholder: Describe pain point or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and API/UI changes
      placeholder: Explain the technical approach.
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Explain security risks, assumptions, and safeguards
      placeholder: Describe threat model impact.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives and trade-offs
      placeholder: List alternatives.
